<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Classicverse">
  <!-- The mark alone: four colour bars, edge to edge, no plate behind them. It is
       the test-card palette of a colour television, which is the whole idea of
       the place in one glyph, and it survives being shrunk to 16px in a browser
       tab where a drawn television would turn to mush. -->
  <rect x="0" y="0" width="8" height="32" fill="#9a2a2a"/>
  <rect x="8" y="0" width="8" height="32" fill="#d4a017"/>
  <rect x="16" y="0" width="8" height="32" fill="#1f6f3e"/>
  <rect x="24" y="0" width="8" height="32" fill="#2a4a8a"/>
</svg>
